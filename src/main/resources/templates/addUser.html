<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            width: 500px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .cancel {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #f44336;
            text-decoration: none;
        }
        .cancel:hover {
            text-decoration: underline;
        }
        h2 {
            text-align: center;
        }
        .roles-section {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
            margin-bottom: 15px;
        }
        small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 12px;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Add New User</h2>

    <form th:action="@{/admin/addUser}" method="post" th:object="${user}">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" th:field="*{name}" required/>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" required/>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" th:field="*{password}" required/>
        </div>

        <div class="form-group">
            <label>Age:</label>
            <input type="number" th:field="*{age}" required/>
        </div>

        <div class="roles-section">
            <label>Roles:</label>
            <select name="roleIds" multiple size="3" required>
                <option th:each="role : ${allRoles}"
                        th:value="${role.id}"
                        th:text="${role.name}">
                </option>
            </select>
            <small>Hold Ctrl (Windows) or Cmd (Mac) to select multiple roles</small>
        </div>

        <button type="submit">Save User</button>
        <a href="/admin" class="cancel">Cancel</a>
    </form>
</div>
</body>
</html>
