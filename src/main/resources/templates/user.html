<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f4;
        }
        .container {
            width: 500px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .info {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .info p {
            margin: 10px 0;
            font-size: 16px;
        }
        .info strong {
            display: inline-block;
            width: 100px;
            color: #555;
        }
        .role-list {
            display: inline;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .role-list li {
            display: inline-block;
            background-color: #2196F3;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            margin: 2px;
            font-size: 14px;
        }
        .logout-btn {
            margin-top: 20px;
            padding: 12px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        .logout-btn:hover {
            background-color: #da190b;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2196F3;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>User Profile</h1>

    <div class="info">
        <p><strong>Name:</strong> <span th:text="${user.name}">User Name</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">user@example.com</span></p>
        <p><strong>Age:</strong> <span th:text="${user.age}">25</span></p>
        <p>
            <strong>Roles:</strong>
        <ul class="role-list">
            <li th:each="role : ${user.roles}" th:text="${role.name}"></li>
        </ul>
        </p>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">Logout</button>
    </form>

    <a href="/admin" class="back-link" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Back to Admin Panel</a>
</div>
</body>
</html>
