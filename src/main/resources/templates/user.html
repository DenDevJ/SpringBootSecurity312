<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <meta charset="UTF-8">
    <title>User information-page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .full-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .info-card {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 25px;
        }
        .card-header-custom h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: white;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            border-left: 4px solid #007bff;
            padding-left: 15px;
            margin-bottom: 25px;
        }
        .user-table {
            width: 100%;
            margin-bottom: 0;
        }
        .user-table thead th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
            padding: 15px;
            font-size: 1rem;
            border-bottom: none;
        }
        .user-table tbody td {
            padding: 12px 15px;
            vertical-align: middle;
            background-color: white;
        }
        .user-table tbody tr:hover td {
            background-color: #f8f9fa;
        }
        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .logout-btn {
            background: none;
            border: 2px solid #dc3545;
            color: #dc3545;
            padding: 10px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background-color: #dc3545;
            color: white;
        }
        .footer-divider {
            border-top: 1px solid #e9ecef;
            margin-top: 30px;
            padding-top: 25px;
        }
        @media (max-width: 768px) {
            .full-page {
                padding: 20px;
            }
            .card-header-custom h2 {
                font-size: 1.3rem;
            }
            .user-table thead th,
            .user-table tbody td {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="full-page">
    <div class="card info-card">
        <div class="card-header-custom">
            <h2>
                <i class="bi bi-person-circle me-2"></i>User information-page
            </h2>
        </div>
        <div class="card-body p-4">
            <div class="section-title">
                <i class="bi bi-info-circle-fill me-2 text-primary"></i>About user
            </div>
            <div class="table-responsive">
                <table class="table table-bordered user-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">6</td>
                        <td th:text="${user.name}">User</td>
                        <td th:text="${user.age}">25</td>
                        <td th:text="${user.email}">user@example.com</td>
                        <td>
                                <span th:each="role : ${user.roles}"
                                      class="role-badge"
                                      th:text="${role.name.replace('ROLE_', '')}">USER</span>
                        </td>
                    </tr>
                    <tr>
                        <td>6</td>
                        <td>User</td>
                        <td>25</td>
                        <td>user@example.com</td>
                        <td><span class="role-badge">USER</span></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>user</td>
                        <td>30</td>
                        <td>user@mail.ru</td>
                        <td><span class="role-badge">USER</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="footer-divider text-center">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
