<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: white;
            min-height: 100vh;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-signin {
            background-color: #28a745;
            border: none;
            transition: all 0.3s;
        }
        .btn-signin:hover {
            background-color: #218838;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold text-dark">Пожалуйста, войдите в систему</h2>
                    <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i> Неверный email или пароль
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                        <i class="bi bi-check-circle-fill"></i> Вы успешно вышли из системы
                    </div>
                    <form method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email:</label>
                            <input type="text" name="username" class="form-control form-control-lg"
                                   placeholder="Email address" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Пароль:</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-signin btn-lg w-100 fw-bold text-white">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <small class="text-muted">
                            <i class="bi bi-shield-lock"></i> Безопасная авторизация
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
