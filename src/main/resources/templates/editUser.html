<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            padding: 40px 20px;
        }
        .edit-card {
            max-width: 550px;
            margin: 0 auto;
        }
        .id-display {
            background-color: #e9ecef;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card edit-card">
        <div class="card-header bg-white">
            <h3 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit user</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/editUser}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">ID</label>
                    <div class="id-display">
                        <span th:text="${user.id}">6</span>
                    </div>
                    <input type="hidden" name="id" th:value="${user.id}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">First name</label>
                    <input type="text" name="firstName" class="form-control" th:value="${user.firstName}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Last name</label>
                    <input type="text" name="lastName" class="form-control" th:value="${user.lastName}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Age</label>
                    <input type="number" name="age" class="form-control" th:value="${user.age}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" th:value="${user.email}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
                    <small class="text-muted">Leave blank to keep current password</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Role</label>
                    <select name="roleIds" class="form-select" multiple size="3">
                        <option th:each="role : ${allRoles}"
                                th:value="${role.id}"
                                th:text="${role.name}"
                                th:selected="${user.roles.contains(role)}">
                        </option>
                    </select>
                    <small class="text-muted">Hold Ctrl/Cmd to select multiple roles</small>
                </div>
                <hr>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='/admin'">
                        <i class="bi bi-x-lg me-1"></i> Close
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i> Edit
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
