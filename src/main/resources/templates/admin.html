<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .full-width-container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }
        .admin-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: none;
            width: 100%;
        }
        .card-header-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-header-custom h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: white;
        }
        .logout-btn-header {
            background: none;
            border: 2px solid #dc3545;
            color: #dc3545;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .logout-btn-header:hover {
            background-color: #dc3545;
            color: white;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            border-left: 4px solid #28a745;
            padding-left: 12px;
            margin-bottom: 20px;
        }
        .btn-new-user {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 25px;
            transition: transform 0.2s;
        }
        .btn-new-user:hover {
            transform: scale(1.02);
        }
        .table-custom {
            margin-bottom: 0;
            width: 100%;
        }
        .table-custom thead th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
            padding: 12px 15px;
            border-bottom: none;
        }
        .table-custom tbody td {
            padding: 12px 15px;
            vertical-align: middle;
        }
        .table-custom tbody tr:hover {
            background-color: #f8f9fa;
        }
        .badge-admin {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 2px;
            display: inline-block;
            color: white;
        }
        .badge-user {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 2px;
            display: inline-block;
            color: white;
        }
        .btn-edit {
            background-color: #ffc107;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0 2px;
        }
        .btn-edit:hover {
            background-color: #e0a800;
        }
        .btn-delete {
            background-color: #dc3545;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0 2px;
            color: white;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
        .all-users-text {
            color: #6c757d;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-body {
            padding: 25px 30px;
        }
        .container, .container-fluid {
            padding-left: 0;
            padding-right: 0;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .card-header-custom h2 {
                font-size: 1.2rem;
            }
            .card-header-custom {
                padding: 15px;
            }
            .card-body {
                padding: 15px;
            }
            .table-custom thead th,
            .table-custom tbody td {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            .btn-edit, .btn-delete {
                padding: 2px 8px;
                font-size: 0.65rem;
            }
            .section-title {
                font-size: 1rem;
            }
            .btn-new-user {
                padding: 5px 12px;
                font-size: 0.8rem;
            }
        }
        @media (min-width: 1400px) {
            .table-custom thead th,
            .table-custom tbody td {
                padding: 15px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid full-width-container">
    <div class="card admin-card">
        <div class="card-header-custom">
            <h2><i class="bi bi-shield-lock-fill me-2"></i>Admin panel</h2>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn-header">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
            </form>
        </div>
        <div class="card-body">
            <div class="header-actions">
                <h3 class="section-title mb-0">Users table</h3>
                <button class="btn btn-success btn-new-user" data-bs-toggle="modal" data-bs-target="#addUserModal">
                    <i class="bi bi-person-plus-fill me-1"></i> New User
                </button>
            </div>
            <div class="all-users-text">
                <i class="bi bi-list-ul me-1"></i> All users
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-custom">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Role</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.name}">Admin</td>
                        <td th:text="${user.email}">admin@example.com</td>
                        <td th:text="${user.age}">30</td>
                        <td>
                                <span th:each="role : ${user.roles}"
                                      th:classappend="${role.name == 'ROLE_ADMIN' ? 'badge-admin' : 'badge-user'}"
                                      class="badge"
                                      th:text="${role.name.replace('ROLE_', '')}">ADMIN</span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-edit" data-bs-toggle="modal" data-bs-target="#editUserModal"
                                    th:data-id="${user.id}" th:data-name="${user.name}"
                                    th:data-email="${user.email}" th:data-age="${user.age}">
                                <i class="bi bi-pencil me-1"></i> Edit
                            </button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-delete" data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                    th:data-id="${user.id}" th:data-name="${user.name}">
                                <i class="bi bi-trash me-1"></i> Delete
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">
                    <i class="bi bi-person-plus-fill"></i> Add New User
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/admin/addUser}" method="post" th:object="${newUser}">
                    <div class="mb-3">
                        <label class="form-label">Name:</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age:</label>
                        <input type="number" name="age" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password:</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles:</label>
                        <select name="roleIds" class="form-select" multiple size="3" required>
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                        <small class="text-muted">Hold Ctrl/Cmd to select multiple roles</small>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title">
                    <i class="bi bi-pencil-square"></i> Edit User
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/admin/edit/{id}}" method="post" th:id="editForm">
                    <input type="hidden" name="id" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label">Name:</label>
                        <input type="text" name="name" id="editUserName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" name="email" id="editUserEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age:</label>
                        <input type="number" name="age" id="editUserAge" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password (leave blank to keep current):</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles:</label>
                        <select name="roleIds" class="form-select" multiple size="3">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle-fill"></i> Delete User
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete user <strong id="deleteUserName"></strong>?</p>
                <form th:action="@{/admin/delete/{id}}" method="post" th:id="deleteForm">
                    <input type="hidden" name="id" id="deleteUserId">
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.querySelectorAll('[data-bs-target="#editUserModal"]').forEach(button => {
        button.addEventListener('click', () => {
            const userId = button.getAttribute('data-id');
            const userName = button.getAttribute('data-name');
            const userEmail = button.getAttribute('data-email');
            const userAge = button.getAttribute('data-age');
            document.getElementById('editUserId').value = userId;
            document.getElementById('editUserName').value = userName;
            document.getElementById('editUserEmail').value = userEmail;
            document.getElementById('editUserAge').value = userAge;
            const editForm = document.getElementById('editForm');
            if (editForm) {
                editForm.action = '/admin/edit/' + userId;
            }
        });
    });
    document.querySelectorAll('[data-bs-target="#deleteUserModal"]').forEach(button => {
        button.addEventListener('click', () => {
            const userId = button.getAttribute('data-id');
            const userName = button.getAttribute('data-name');
            document.getElementById('deleteUserId').value = userId;
            document.getElementById('deleteUserName').innerText = userName;
            const deleteForm = document.getElementById('deleteForm');
            if (deleteForm) {
                deleteForm.action = '/admin/delete/' + userId;
            }
        });
    });
</script>
</body>
</html>
